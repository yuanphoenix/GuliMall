server:
  port: 25000

xxl:
  job:
    admin:
      accessToken: default_token
      addresses: http://10.200.200.1:33678/xxl-job-admin
    executor:
      appname: gulimall-job
      port: -1
      logpath: ~/logs/xxl-job/

spring:
  application:
    name: gulimall-seckill

  cloud:
    nacos:
      server-addr: 10.200.200.1:8848
      config:
        import-check:
          enabled: false
  data:
    redis:
      host: 10.200.200.1
      port: 6379


  rabbitmq:
    host: 10.200.200.1
    port: 5672
    virtual-host: /
    username: admin
    password: admin123
    #消费端需要手动确认
    listener:
      simple:
        acknowledge-mode: manual
    #        开启发送端确认
    publisher-confirm-type: correlated
    #    开启发送端消息抵达队列的确认
    publisher-returns: true
    #    开启发送端消息抵达队列的异步的确认
    template:
      mandatory: true

